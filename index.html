<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Rocket Status Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        success: '#10B981',
                        warning: '#F59E0B',
                        error: '#EF4444',
                        background: '#0F172A',
                        surface: '#1E293B',
                        'surface-light': '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse-slow {
            animation: pulse-slow 2s ease-in-out infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        .progress-bar {
            transition: width 1s ease-out;
        }
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
    </style>
</head>
<body class="bg-background text-gray-100 font-sans antialiased">
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <header class="mb-8 fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                            🚀 Rocket Status Dashboard
                        </h1>
                        <p class="text-gray-400 mt-2">Real-time agent activity & project monitoring</p>
                    </div>
                    <div class="text-right">
                        <div id="status-indicator" class="flex items-center gap-2 mb-2">
                            <div class="w-3 h-3 bg-success rounded-full pulse-slow"></div>
                            <span id="agent-status" class="text-sm font-medium text-success">ACTIVE</span>
                        </div>
                        <p id="last-updated" class="text-xs text-gray-500">Loading...</p>
                    </div>
                </div>
            </header>

            <!-- Current Activity -->
            <section id="current-activity" class="mb-8 fade-in glass rounded-lg p-6 border-l-4 border-primary">
                <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3">Current Activity</h2>
                <div class="flex items-start gap-4">
                    <div class="w-2 h-2 bg-primary rounded-full pulse-slow mt-2"></div>
                    <div class="flex-1">
                        <p id="current-task" class="text-xl font-medium text-gray-100 mb-1">Loading...</p>
                        <p id="current-time" class="text-sm text-gray-400"></p>
                    </div>
                </div>
            </section>

            <!-- Main Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <!-- Projects -->
                <section class="lg:col-span-2 glass rounded-lg p-6 fade-in">
                    <h2 class="text-lg font-semibold mb-4">Active Projects</h2>
                    <div id="projects-list" class="space-y-4">
                        <!-- Projects loaded via JS -->
                    </div>
                </section>

                <!-- Metrics -->
                <section class="glass rounded-lg p-6 fade-in">
                    <h2 class="text-lg font-semibold mb-4">Metrics</h2>
                    <div id="metrics-grid" class="space-y-3">
                        <!-- Metrics loaded via JS -->
                    </div>
                </section>
            </div>

            <!-- Secondary Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <!-- Cron Schedule -->
                <section class="glass rounded-lg p-6 fade-in">
                    <h2 class="text-lg font-semibold mb-4">Automated Tasks</h2>
                    <div id="cron-jobs" class="space-y-3">
                        <!-- Cron jobs loaded via JS -->
                    </div>
                </section>

                <!-- Recent Activity -->
                <section class="glass rounded-lg p-6 fade-in">
                    <h2 class="text-lg font-semibold mb-4">Recent Activity</h2>
                    <div id="activity-feed" class="space-y-3">
                        <!-- Activity loaded via JS -->
                    </div>
                </section>
            </div>

            <!-- Upcoming Deadlines -->
            <section class="glass rounded-lg p-6 fade-in">
                <h2 class="text-lg font-semibold mb-4">Upcoming Deadlines</h2>
                <div id="deadlines-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Deadlines loaded via JS -->
                </div>
            </section>

            <!-- Footer -->
            <footer class="mt-8 text-center text-sm text-gray-500">
                <p>Rocket AI Agent • Powered by OpenClaw • Auto-updates every 60 seconds</p>
            </footer>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
